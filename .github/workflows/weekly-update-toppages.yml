name: Weekly Update Top Pages

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: ["*"]

jobs:
  update:
    runs-on: ubuntu-latest
    environment: gist-update

    steps:
    - name: Checkout homeassistant_umami
      uses: actions/checkout@v6
      with:
        repository: rpeyron/homeassistant_umami
        path: homeassistant_umami

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        cd homeassistant_umami
        # Assuming requirements.txt exists; adjust if needed
        pip install -r requirements.txt || echo "No requirements.txt found"

    - name: Run umami script and update gist
      env:
        # github.token cannot edit gists (403); use a PAT with gist scope stored in secrets
        GH_TOKEN: ${{ secrets.GIST_TOKEN }}
      run: |
        if [ -z "$GH_TOKEN" ]; then
          echo "ERROR: Secret GIST_TOKEN is not set. Create it with a PAT that has gist scope." >&2
          exit 1
        fi

        cd homeassistant_umami
        python config/scripts/umami.py ${{ secrets.UMAMI_SHARE_URL }} --data path_with_titles --limit 25 --days 30 | gh gist edit ${{ secrets.UMAMI_TOP25_GIST }} -f lprp-top.json -
